<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>UniMan</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="uygulama-ust-bilgi">
      <div class="header-icerik">
        <div class="baslik-alani">
          <h1>UniMan</h1>
        </div>
        <img
          src="assets/Gemini_Generated_Image_l8qq3il8qq3il8qq-Photoroom.png"
          alt="UniMan Logo"
          class="uniman-logo"
        />
      </div>
    </header>

    <main id="uygulama-tasiyici" class="tasiyici">
      <section id="gorunum-ana-sayfa" class="gorunum-bolumu">
        <h2 class="bolum-basligi">Nasıl Yardımcı Olabilirim?</h2>
        <div class="izgara-menu">
          <div class="menu-karti" onclick="modulYukle('not-hesaplayici')">
            <div class="kart-ikonu">🧮</div>
            <h3>Not Hesaplayıcı</h3>
            <p>Vize/Final hedefini belirle</p>
          </div>
          <div class="menu-karti" onclick="modulYukle('devamsizlik')">
            <div class="kart-ikonu">📅</div>
            <h3>Devamsızlık</h3>
            <p>Haftalık haklarını takip et</p>
          </div>
        </div>
      </section>

      <section id="modul-not-hesaplayici" class="gorunum-bolumu gizli">
        <div class="gorunum-baslik-alani">
          <button class="ikon-btn" onclick="anaSayfayaDon()">⬅ Geri</button>
          <h2>Not Hesaplayıcı</h2>
        </div>
        <div class="kart-govdesi">
          <div class="girdi-grubu">
            <label for="ders-adi">Dersin Adı (İsteğe Bağlı)</label>
            <input type="text" id="ders-adi" placeholder="Örn: Veri Yapıları" />
          </div>
          <div class="girdi-grubu">
            <label for="gecme-notu">Dersi Geçme Notu</label>
            <input type="number" id="gecme-notu" placeholder="Örn: 60" min="0" max="100" value="60" />
          </div>
          <div class="izgara-menu" style="margin-top: 0; margin-bottom: 15px; gap: 10px">
            <div class="girdi-grubu" style="margin-bottom: 0">
              <label for="vize-notu">Vize Notun</label>
              <input type="number" id="vize-notu" placeholder="Not" min="0" max="100" />
            </div>
            <div class="girdi-grubu" style="margin-bottom: 0">
              <label for="vize-yuzdesi">Yüzdelik Etkisi (%)</label>
              <input type="number" id="vize-yuzdesi" placeholder="Örn: 40" min="0" max="100" />
            </div>
          </div>
          <div id="etkinlikler-kapsayici">
            <div
              class="etkinlik-satiri"
              style="display: flex; align-items: flex-end; gap: 10px; margin-bottom: 15px"
            >
              <button
                type="button"
                id="btn-etkinlik-ekle"
                style="
                  background-color: var(--vurgu-rengi);
                  color: #000;
                  border: none;
                  border-radius: 8px;
                  width: 42px;
                  height: 42px;
                  font-size: 1.5rem;
                  font-weight: bold;
                  cursor: pointer;
                  flex-shrink: 0;
                  margin-bottom: 2px;
                "
              >
                +
              </button>
              <div class="girdi-grubu" style="margin-bottom: 0; flex: 1">
                <label>Yıl İçi Etkinlik Notu</label>
                <input type="number" class="etkinlik-notu" placeholder="Not" min="0" max="100" />
              </div>
              <div class="girdi-grubu" style="margin-bottom: 0; flex: 1">
                <label>Yüzdesi (%)</label>
                <input type="number" class="etkinlik-yuzdesi" placeholder="Örn: 10" min="0" max="100" />
              </div>
            </div>
          </div>
          <button id="btn-hesapla" class="ana-btn">Hedef Finali Hesapla</button>
        </div>
        <div id="sonuc-alani" class="sonuc-kutusu gizli"></div>
        <div class="kayitli-dersler-alani">
          <h3 style="margin-bottom: 10px; font-size: 1.1rem">Kaydedilen Dersler</h3>
          <div id="ders-listesi" class="ders-listesi">
            <p class="soluk-metin" style="font-size: 0.9rem">Henüz kaydedilmiş bir ders yok.</p>
          </div>
        </div>
      </section>

      <section id="modul-devamsizlik" class="gorunum-bolumu gizli">
        <div class="gorunum-baslik-alani">
          <button class="ikon-btn" onclick="anaSayfayaDon()">⬅ Geri</button>
          <h2>Devamsızlık Takibi</h2>
        </div>
        <div class="kart-govdesi">
          <div class="girdi-grubu">
            <label for="dev-ders-adi">Dersin Adı</label>
            <input type="text" id="dev-ders-adi" placeholder="Örn: Algoritma" />
          </div>
          <div class="girdi-grubu">
            <label for="dev-sinir">Maksimum Devamsızlık Hakkı</label>
            <input type="number" id="dev-sinir" placeholder="Örn: 4" min="1" value="4" />
          </div>
          <button id="btn-dev-ekle" class="ana-btn">Dersi Listeye Ekle</button>
        </div>
        <div class="kayitli-dersler-alani">
          <h3 style="margin-bottom: 10px; font-size: 1.1rem">Takip Edilen Dersler</h3>
          <div id="dev-listesi" class="ders-listesi">
            <p class="soluk-metin" style="font-size: 0.9rem">Henüz takip edilen bir ders yok.</p>
          </div>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
