<div class="gorunum-baslik-alani">
  <button id="btn-geri-don" class="ikon-btn" onclick="anaSayfayaDon()">⬅ Geri</button>
  <h2>Not Hesaplayıcı</h2>
</div>

<div class="kart-govdesi">
  <div class="girdi-grubu">
    <label for="ders-adi">Dersin Adı (İsteğe Bağlı)</label>
    <input type="text" id="ders-adi" placeholder="Örn: Veri Yapıları" />
  </div>

  <div class="girdi-grubu">
    <label for="gecme-notu">Dersi Geçme Notu</label>
    <input type="number" id="gecme-notu" placeholder="Örn: 60" min="0" max="100" value="60" />
  </div>

  <div class="izgara-menu" style="margin-top: 0; margin-bottom: 15px; gap: 10px">
    <div class="girdi-grubu" style="margin-bottom: 0">
      <label for="vize-notu">Vize Notun</label>
      <input type="number" id="vize-notu" placeholder="Not" min="0" max="100" />
    </div>
    <div class="girdi-grubu" style="margin-bottom: 0">
      <label for="vize-yuzdesi">Yüzdelik Etkisi (%)</label>
      <input type="number" id="vize-yuzdesi" placeholder="Örn: 40" min="0" max="100" />
    </div>
  </div>

  <div id="etkinlikler-kapsayici">
    <div class="etkinlik-satiri" style="display: flex; align-items: flex-end; gap: 10px; margin-bottom: 15px">
      <button
        type="button"
        id="btn-etkinlik-ekle"
        style="
          background-color: var(--vurgu-rengi);
          color: #000;
          border: none;
          border-radius: 8px;
          width: 42px;
          height: 42px;
          font-size: 1.5rem;
          font-weight: bold;
          cursor: pointer;
          flex-shrink: 0;
          margin-bottom: 2px;
        "
      >
        +
      </button>
      <div class="girdi-grubu" style="margin-bottom: 0; flex: 1">
        <label>Yıl İçi Etkinlik Notu</label>
        <input type="number" class="etkinlik-notu" placeholder="Not" min="0" max="100" />
      </div>
      <div class="girdi-grubu" style="margin-bottom: 0; flex: 1">
        <label>Yüzdesi (%)</label>
        <input type="number" class="etkinlik-yuzdesi" placeholder="Örn: 10" min="0" max="100" />
      </div>
    </div>
  </div>

  <button id="btn-hesapla" class="ana-btn">Hedef Finali Hesapla</button>
</div>

<div id="sonuc-alani" class="sonuc-kutusu gizli"></div>

<div class="kayitli-dersler-alani">
  <h3 style="margin-bottom: 10px; font-size: 1.1rem">Kaydedilen Dersler</h3>
  <div id="ders-listesi" class="ders-listesi">
    <p class="soluk-metin" style="font-size: 0.9rem">Henüz kaydedilmiş bir ders yok.</p>
  </div>
</div>
